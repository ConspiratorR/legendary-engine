<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RustEngine Web Demo</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #1a1a2e;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        #status {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #e0e0e0;
            font-family: monospace;
            font-size: 18px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="status">Loading RustEngine...</div>
    <canvas id="canvas"></canvas>
    <script type="module">
        import init, { start } from './pkg/web_demo.js';
        init().then(() => {
            start();
        });
    </script>
</body>
</html>
