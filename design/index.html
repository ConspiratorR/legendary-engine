<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RustEngine - 游戏引擎</title>
  <script src="https://unpkg.com/vue@3.4.21/dist/vue.global.prod.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-primary: #0d0d0f;
      --bg-secondary: #161619;
      --bg-tertiary: #1e1e22;
      --bg-elevated: #252529;
      --surface: #2a2a30;
      --border: #3a3a42;
      --border-subtle: #2d2d35;
      --text-primary: #e8e8ec;
      --text-secondary: #9898a0;
      --text-muted: #5a5a66;
      --accent-primary: #00d4aa;
      --accent-secondary: #ff6b35;
      --accent-tertiary: #7c5cff;
    }
    body {
      font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
    }
    .font-mono { font-family: 'JetBrains Mono', monospace; }

    .launcher {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 32px;
      max-width: 1200px;
      margin: 0 auto;
    }

    /* Header */
    .launcher-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 48px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border-subtle);
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-tertiary));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }
    .logo-text {
      font-size: 24px;
      font-weight: 700;
    }
    .header-actions {
      display: flex;
      gap: 12px;
    }
    .btn {
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      font-family: inherit;
      transition: all 0.2s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .btn-secondary {
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      color: var(--text-primary);
    }
    .btn-secondary:hover {
      border-color: var(--accent-primary);
      color: var(--accent-primary);
    }
    .btn-ghost {
      background: transparent;
      color: var(--text-secondary);
    }
    .btn-ghost:hover {
      color: var(--text-primary);
    }

    /* Main Grid */
    .launcher-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
      flex: 1;
    }

    /* Recent Projects */
    .launcher-section {
      background: var(--bg-secondary);
      border: 1px solid var(--border-subtle);
      border-radius: 16px;
      padding: 24px;
    }
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .section-title {
      font-size: 16px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-title span {
      font-size: 18px;
    }
    .section-action {
      font-size: 12px;
      color: var(--text-muted);
      cursor: pointer;
    }
    .section-action:hover {
      color: var(--accent-primary);
    }

    .project-card {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-subtle);
      border-radius: 10px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .project-card:hover {
      border-color: var(--accent-primary);
      transform: translateY(-2px);
    }
    .project-icon {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, var(--accent-secondary), var(--accent-tertiary));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }
    .project-info {
      flex: 1;
    }
    .project-name {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .project-path {
      font-size: 11px;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
    }
    .empty-icon {
      font-size: 48px;
      margin-bottom: 12px;
      opacity: 0.5;
    }
    .empty-text {
      font-size: 13px;
    }

    /* Quick Actions */
    .action-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    .action-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 20px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-subtle);
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      color: var(--text-primary);
    }
    .action-card:hover {
      border-color: var(--accent-primary);
      transform: translateY(-2px);
    }
    .action-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-tertiary));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }
    .action-label {
      font-size: 13px;
      font-weight: 500;
    }

    /* Learn Section */
    .learn-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    .learn-card {
      padding: 16px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-subtle);
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .learn-card:hover {
      border-color: var(--accent-primary);
    }
    .learn-icon {
      font-size: 24px;
      margin-bottom: 8px;
    }
    .learn-title {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .learn-desc {
      font-size: 11px;
      color: var(--text-muted);
    }

    /* Footer */
    .launcher-footer {
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 12px;
      color: var(--text-muted);
    }
    .footer-links {
      display: flex;
      gap: 20px;
    }
    .footer-links a {
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .footer-links a:hover {
      color: var(--accent-primary);
    }

    /* Version badge */
    .version-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: var(--bg-tertiary);
      border-radius: 6px;
      font-size: 12px;
      color: var(--text-secondary);
    }
    .version-badge span {
      color: var(--accent-primary);
      font-weight: 600;
    }

    @media (max-width: 900px) {
      .launcher-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="launcher">
      <!-- Header -->
      <header class="launcher-header">
        <div class="logo">
          <div class="logo-icon">⚡</div>
          <span class="logo-text">RustEngine</span>
        </div>
        <div class="header-actions">
          <a href="landing.html" class="btn btn-ghost">关于</a>
          <a href="settings.html" class="btn btn-secondary">⚙️ 设置</a>
        </div>
      </header>

      <!-- Main Grid -->
      <div class="launcher-grid">
        <!-- Recent Projects -->
        <div class="launcher-section">
          <div class="section-header">
            <div class="section-title">
              <span>📁</span> 最近项目
            </div>
            <span class="section-action">清除</span>
          </div>
          <div v-if="recentProjects.length > 0">
            <div 
              class="project-card" 
              v-for="project in recentProjects" 
              :key="project.id"
              @click="openProject(project)"
            >
              <div class="project-icon">{{ project.icon }}</div>
              <div class="project-info">
                <div class="project-name">{{ project.name }}</div>
                <div class="project-path">{{ project.path }}</div>
              </div>
            </div>
          </div>
          <div v-else class="empty-state">
            <div class="empty-icon">📂</div>
            <div class="empty-text">暂无最近项目</div>
          </div>
        </div>

        <!-- Quick Actions -->
        <div class="launcher-section">
          <div class="section-header">
            <div class="section-title">
              <span>🚀</span> 快速开始
            </div>
          </div>
          <div class="action-grid">
            <a href="project-wizard.html" class="action-card">
              <div class="action-icon">➕</div>
              <span class="action-label">新建项目</span>
            </a>
            <a href="editor.html" class="action-card">
              <div class="action-icon" style="background:linear-gradient(135deg,#ff6b35,#ff9f43)">📂</div>
              <span class="action-label">打开项目</span>
            </a>
            <a href="material-editor.html" class="action-card">
              <div class="action-icon" style="background:linear-gradient(135deg,#7c5cff,#a55cff)">🎨</div>
              <span class="action-label">材质编辑器</span>
            </a>
            <a href="animation-editor.html" class="action-card">
              <div class="action-icon" style="background:linear-gradient(135deg,#2ed573,#26de81)">🎬</div>
              <span class="action-label">动画编辑器</span>
            </a>
          </div>
        </div>

        <!-- Learn -->
        <div class="launcher-section">
          <div class="section-header">
            <div class="section-title">
              <span>📚</span> 学习资源
            </div>
          </div>
          <div class="learn-grid">
            <div class="learn-card">
              <div class="learn-icon">📖</div>
              <div class="learn-title">文档</div>
              <div class="learn-desc">完整的使用指南</div>
            </div>
            <div class="learn-card">
              <div class="learn-icon">🎓</div>
              <div class="learn-title">教程</div>
              <div class="learn-desc">入门到进阶</div>
            </div>
            <div class="learn-card">
              <div class="learn-icon">💬</div>
              <div class="learn-title">社区</div>
              <div class="learn-desc">与其他开发者交流</div>
            </div>
            <div class="learn-card">
              <div class="learn-icon">🔧</div>
              <div class="learn-title">插件开发</div>
              <div class="learn-desc">扩展引擎功能</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Footer -->
      <footer class="launcher-footer">
        <div class="version-badge">
          版本 <span>v2.0.0</span>
        </div>
        <div class="footer-links">
          <a href="#">隐私政策</a>
          <a href="#">使用条款</a>
          <a href="#">许可证</a>
        </div>
        <div>
          © 2024 RustEngine
        </div>
      </footer>
    </div>
  </div>

  <script>
    const { createApp, ref } = Vue;
    
    createApp({
      setup() {
        const recentProjects = ref([
          { id: 1, name: 'MyAwesomeGame', path: 'C:\\Projects\\MyAwesomeGame', icon: '🎮' },
          { id: 2, name: 'RPG_Demo', path: 'C:\\Projects\\RPG_Demo', icon: '⚔️' },
          { id: 3, name: 'PhysicsTest', path: 'C:\\Projects\\PhysicsTest', icon: '🔬' }
        ]);

        const openProject = (project) => {
          window.location.href = 'editor.html';
        };

        return {
          recentProjects,
          openProject
        };
      }
    }).mount('#app');
  </script>
</body>
</html>
